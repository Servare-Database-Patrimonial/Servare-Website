server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Redirect /app/* → app.servare.cloud (post-cutover Oracle).
    # Antes de cutover esta rule queda dormida porque CF tiene Redirect Rule
    # /app → Firebase que intercepta en el edge. Cuando C3 borre esa rule CF,
    # este 301 toma el control. $request_uri preserva la subpath (ej. /app/foo).
    location = /app  { return 301 https://app.servare.cloud$request_uri; }
    location /app/   { return 301 https://app.servare.cloud$request_uri; }

    # Páginas
    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    # Cache de assets: imágenes y fuentes son immutable 1 año (rara vez cambian
    # y los browsers las cargan en cada visita).
    location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # CSS / JS: cache corto + must-revalidate. Sin esto, cualquier cambio a
    # nav.js / auth.js / config.js no se propaga hasta que el browser decida
    # refrescar. Etag + Last-Modified manejan el 304 cuando no hubo cambios.
    location ~* \.(css|js)$ {
        expires 5m;
        add_header Cache-Control "public, max-age=300, must-revalidate";
    }

    # No cachear HTML
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # Seguridad
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Error pages
    error_page 404 /index.html;
}
