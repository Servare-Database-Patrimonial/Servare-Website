# Security Headers for GitHub Pages
# This workflow ensures security headers are properly configured

name: Security Headers Check

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  security-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Check for mixed content
        run: |
          echo "Checking for HTTP links in production files..."
          # Search only in source files we control (not compiled app bundle or binaries)
          # Exclude: SVG/XML namespace URIs, Apache license URLs, localhost, examples
          if grep -r "http://" public/ \
            --include="*.html" --include="*.css" --include="*.js" \
            --exclude-dir=node_modules --exclude-dir=app \
            | grep -v "localhost" \
            | grep -v "example" \
            | grep -v "http://www.w3.org/" \
            | grep -v "http://www.apache.org" \
            | grep -v "data:image/"; then
            echo "⚠️  Warning: Found HTTP links in production files"
            exit 1
          else
            echo "✅ No mixed content found"
          fi

      - name: Validate HTTPS configuration
        run: |
          echo "✅ Security check passed"
