  <style>
    .dev-container {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
      background: var(--bg-main);
      transition: background 0.3s;
    }
    .dev-icon {
      font-size: 4rem;
      margin-bottom: 1.5rem;
      opacity: 0.6;
    }
    .dev-container h1 {
      font-size: 2.8rem;
      font-weight: 700;
      color: var(--text-heading);
      letter-spacing: -0.03em;
      margin-bottom: 1rem;
    }
    .dev-container p {
      font-size: 1.1rem;
      color: var(--text-body);
      max-width: 500px;
      margin-bottom: 2.5rem;
      line-height: 1.7;
    }
    .dev-back {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: var(--green);
      color: #fff;
      text-decoration: none;
      border-radius: 9999px;
      font-weight: 700;
      font-size: 0.95rem;
      transition: transform 0.2s;
    }
    .dev-back:hover {
      transform: translateY(-2px);
    }
  </style>
</head>
